name: Build and commit dist

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install mods dependencies
        run: npm install
        working-directory: mods

      - name: Build mods (userScript.js)
        run: npx rollup -c rollup.config.js
        working-directory: mods

      - name: Install service dependencies
        run: npm install
        working-directory: service

      - name: Build service (service.js)
        run: npx rollup -c rollup.config.js
        working-directory: service

      - name: Commit built dist files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f dist/
          git diff --staged --quiet || git commit -m "chore: build dist [skip ci]"
          git push
